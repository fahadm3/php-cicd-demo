name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test PHP Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    
    - name: Check PHP syntax
      run: |
        echo "Checking PHP syntax..."
        find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;
        echo "✅ Syntax check passed"
    
    - name: Verify required files exist
      run: |
        echo "Checking required files..."
        [ -f "index.php" ] && echo "✅ index.php found" || echo "❌ index.php missing"
        [ -f "health.php" ] && echo "✅ health.php found" || echo "❌ health.php missing"
        [ -f "time.php" ] && echo "✅ time.php found" || echo "❌ time.php missing"
    
    - name: Simulate deployment trigger
      run: |
        echo "✅ All tests passed - ready for deployment"
        echo "Note: Render auto-deploys from GitHub repository"

  deploy:
    name: Deployment Status
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: Log deployment info
      run: |
        echo "🚀 Deployment triggered for commit: ${{ github.sha }}"
        echo "📁 Repository: ${{ github.repository }}"
        echo "🌿 Branch: ${{ github.ref }}"
        echo "✅ Application is ready for Render deployment"
        echo "📍 Visit: https://dashboard.render.com"
